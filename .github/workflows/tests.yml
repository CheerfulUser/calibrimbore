name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install scientific stack without pysynphot (requires CDBS data files
          # too large for CI; the test suite mocks it via conftest.py).
          pip install numpy pandas scipy matplotlib astropy astroquery extinction ipython
          pip install pytest pytest-cov
          pip install -e . --no-deps

      - name: Run tests
        run: |
          pytest tests/ -v --cov=calibrimbore --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
